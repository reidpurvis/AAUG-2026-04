<svg xmlns="http://www.w3.org/2000/svg" width="800" viewBox="0 0 680 420" style="background:#ffffff;font-family:sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; }
      .th { font-size: 14px; font-weight: 500; fill: #1a1a1a; }
      .ts { font-size: 12px; font-weight: 400; fill: #555; }
      .arr { stroke: #888; stroke-width: 1.5; fill: none; }
      /* Teal node */
      .c-teal rect  { fill: #E1F5EE; stroke: #0F6E56; }
      .c-teal .th   { fill: #085041; }
      .c-teal .ts   { fill: #0F6E56; }
      /* Gray node */
      .c-gray rect  { fill: #F1EFE8; stroke: #5F5E5A; }
      .c-gray .th   { fill: #2C2C2A; }
      .c-gray .ts   { fill: #5F5E5A; }
      /* Blue node */
      .c-blue rect  { fill: #E6F1FB; stroke: #185FA5; }
      .c-blue .th   { fill: #0C447C; }
      .c-blue .ts   { fill: #185FA5; }
      /* Green dashed */
      .c-green-dash { stroke: #639922; stroke-width: 1.5; stroke-dasharray: 5 4; fill: none; }
      /* Insight box */
      .insight-box  { fill: #F1EFE8; stroke: #D3D1C7; stroke-width: 0.5; }
    </style>
  </defs>

  <!-- ── Step labels ── -->
  <text class="ts" x="100" y="28" text-anchor="middle" font-weight="500">① Trigger</text>
  <text class="ts" x="280" y="28" text-anchor="middle" font-weight="500">② OIDC token</text>
  <text class="ts" x="460" y="28" text-anchor="middle" font-weight="500">③ Validate &amp; exchange</text>
  <text class="ts" x="610" y="28" text-anchor="middle" font-weight="500">④ Deploy</text>

  <!-- ── GitHub Actions box ── -->
  <g class="c-gray">
    <rect x="20" y="50" width="160" height="70" rx="8" stroke-width="0.5"/>
    <text class="th" x="100" y="82" text-anchor="middle">GitHub Actions</text>
    <text class="ts" x="100" y="102" text-anchor="middle">push / PR / dispatch</text>
  </g>

  <!-- Arrow 1: GitHub → OIDC IdP -->
  <line x1="180" y1="85" x2="218" y2="85" class="arr" stroke="#5F5E5A" marker-end="url(#arrow)"/>
  <text class="ts" x="199" y="76" text-anchor="middle">JWT request</text>

  <!-- ── GitHub OIDC IdP box ── -->
  <g class="c-teal">
    <rect x="220" y="50" width="180" height="70" rx="8" stroke-width="0.5"/>
    <text class="th" x="310" y="78" text-anchor="middle">GitHub OIDC IdP</text>
    <text class="ts" x="310" y="100" text-anchor="middle">token.actions.githubusercontent.com</text>
  </g>

  <!-- Arrow 2: OIDC IdP → Entra ID -->
  <line x1="400" y1="85" x2="418" y2="85" class="arr" stroke="#0F6E56" marker-end="url(#arrow)"/>
  <text class="ts" x="409" y="76" text-anchor="middle">OIDC JWT</text>

  <!-- ── Entra ID box ── -->
  <g class="c-blue">
    <rect x="420" y="50" width="160" height="70" rx="8" stroke-width="0.5"/>
    <text class="th" x="500" y="78" text-anchor="middle">Entra ID</text>
    <text class="ts" x="500" y="98" text-anchor="middle">validates subject claim</text>
  </g>

  <!-- Arrow 3: Entra → Azure (downward) -->
  <line x1="500" y1="120" x2="500" y2="168" class="arr" stroke="#185FA5" marker-end="url(#arrow)"/>
  <text class="ts" x="522" y="148" text-anchor="start">access token</text>

  <!-- ── Azure subscription box ── -->
  <g class="c-blue">
    <rect x="420" y="170" width="160" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="500" y="195" text-anchor="middle">Azure subscription</text>
    <text class="ts" x="500" y="213" text-anchor="middle">Contributor role</text>
  </g>

  <!-- Bicep deployment curved arrow -->
  <path d="M100 120 Q100 300 410 240" class="c-green-dash" marker-end="url(#arrow)"/>
  <text class="ts" x="180" y="300" text-anchor="middle" fill="#3B6D11">Bicep deployment</text>

  <!-- Divider line -->
  <line x1="40" y1="270" x2="640" y2="270" stroke="#D3D1C7" stroke-width="0.5"/>

  <!-- ── Key insight box ── -->
  <rect class="insight-box" x="20" y="285" width="640" height="120" rx="8"/>
  <text x="40" y="312" font-size="14" font-weight="500" fill="#2C2C2A">Why no stored secrets?</text>
  <text class="ts" x="40" y="334">GitHub mints a short-lived JWT (expires in minutes). Entra ID checks the</text>
  <text class="ts" x="40" y="352">issuer (token.actions.githubusercontent.com) and the subject claim against</text>
  <text class="ts" x="40" y="370">your registered federated credential. If they match, it issues an Azure</text>
  <text class="ts" x="40" y="388">access token. No password or secret ever leaves GitHub or touches your repo.</text>
</svg>
