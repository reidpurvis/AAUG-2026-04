name: Deploy AAUG Website to Static Web App

on:
  push:
    branches:
      - main
    paths:
      - 'AAUG Website App/**'
      - '.github/workflows/deploy-aaug-website.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      skip_validation:
        description: 'Skip HTML validation (use with caution)'
        required: false
        default: false
        type: boolean

env:
  RESOURCE_GROUP: 'aaug-website-rg'
  APP_LOCATION: './AAUG Website App'
  OUTPUT_LOCATION: '.'
  AZURE_LOCATION: 'eastus2'

jobs:
  validate:
    name: Validate Website Files
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_validation != 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate HTML files exist
        run: |
          echo "📋 Checking required HTML files..."
          if [ ! -f "AAUG Website App/index.html" ]; then
            echo "❌ index.html not found"
            exit 1
          fi
          if [ ! -f "AAUG Website App/artemis.html" ]; then
            echo "❌ artemis.html not found"
            exit 1
          fi
          echo "✅ All required HTML files present"

      - name: Validate HTML syntax
        run: |
          echo "🔍 Validating HTML syntax..."
          for file in AAUG\ Website\ App/*.html; do
            if [ -f "$file" ]; then
              echo "  Checking: $(basename $file)"
              if ! grep -q "<!DOCTYPE" "$file"; then
                echo "  ⚠️  Warning: DOCTYPE declaration missing in $file"
              fi
              if ! grep -q "</html>" "$file"; then
                echo "  ❌ Error: Missing closing </html> tag in $file"
                exit 1
              fi
            fi
          done
          echo "✅ HTML validation passed"

      - name: Check file sizes
        run: |
          echo "📊 Checking file sizes..."
          du -sh AAUG\ Website\ App/*
          echo ""
          total=$(du -sh AAUG\ Website\ App/ | cut -f1)
          echo "✅ Total size: $total (within limits)"

  check-infrastructure:
    name: Verify Azure Infrastructure
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      infra_ready: ${{ steps.infra-check.outputs.ready }}
      app_name: ${{ steps.infra-check.outputs.app_name }}
      env_name: ${{ steps.env.outputs.env_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV_NAME="${{ inputs.environment }}"
          else
            ENV_NAME="dev"
          fi
          echo "env_name=${ENV_NAME}" >> $GITHUB_OUTPUT
          echo "app_name=aaug-website-${ENV_NAME}" >> $GITHUB_OUTPUT

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Check infrastructure
        id: infra-check
        run: |
          ENV_NAME="${{ steps.env.outputs.env_name }}"
          APP_NAME="${{ steps.env.outputs.app_name }}"

          echo "🔍 Checking Azure infrastructure..."
          echo "  Environment: $ENV_NAME"
          echo "  App Name: $APP_NAME"
          echo "  Resource Group: ${{ env.RESOURCE_GROUP }}"

          if ! az group exists -n ${{ env.RESOURCE_GROUP }} -o tsv | grep -q true; then
            echo "❌ Resource Group not found: ${{ env.RESOURCE_GROUP }}"
            echo ""
            echo "📝 Instructions to create infrastructure:"
            echo ""
            echo "1. Deploy the Bicep template:"
            echo "   cd AAUG\ Website\ Infra"
            echo "   az deployment sub create \\"
            echo "     --name aaug-website-${ENV_NAME} \\"
            echo "     --location eastus2 \\"
            echo "     --template-file main.bicep \\"
            echo "     --parameters \\"
            echo "       environmentName=${ENV_NAME} \\"
            echo "       location=eastus2"
            echo ""
            echo "2. Or create resource group manually:"
            echo "   az group create -n ${{ env.RESOURCE_GROUP }} -l eastus2"
            echo ""
            exit 1
          fi
          echo "✅ Resource Group found"

          # Check if Static Web App exists
          SWA_COUNT=$(az staticwebapp list -g ${{ env.RESOURCE_GROUP }} --query "[?name=='$APP_NAME'] | length(@)" -o tsv 2>/dev/null || echo "0")

          if [ "$SWA_COUNT" -eq 0 ]; then
            echo "⚠️  Static Web App does not exist yet: $APP_NAME"
            echo "   It will be created automatically during deployment"
            echo ""
            echo "Available Static Web Apps in ${{ env.RESOURCE_GROUP }}:"
            az staticwebapp list -g ${{ env.RESOURCE_GROUP }} --query "[].{Name:name, State:state}" -o table 2>/dev/null || echo "  (none)"
          else
            echo "✅ Static Web App found: $APP_NAME"
          fi

          echo "ready=true" >> $GITHUB_OUTPUT
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT

  build-and-deploy:
    name: Deploy to Static Web App
    runs-on: ubuntu-latest
    needs: [validate, check-infrastructure]
    if: needs.check-infrastructure.outputs.infra_ready == 'true'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get deployment token
        id: swa-token
        run: |
          echo "🔑 Retrieving deployment token..."
          APP_NAME="${{ needs.check-infrastructure.outputs.app_name }}"
          RG="${{ env.RESOURCE_GROUP }}"

          # Check if Static Web App exists
          echo "📍 Checking for Static Web App: $APP_NAME"
          SWA_EXISTS=$(az staticwebapp list -g "$RG" --query "[?name=='$APP_NAME'] | length(@)" -o tsv)

          if [ "$SWA_EXISTS" -eq 0 ]; then
            echo "❌ Static Web App does not exist: $APP_NAME"
            echo ""
            echo "Available Static Web Apps:"
            az staticwebapp list -g "$RG" --query "[].name" -o table
            echo ""
            echo "📝 Creating Static Web App..."
            az staticwebapp create \
              --name "$APP_NAME" \
              --resource-group "$RG" \
              --location "eastus2" \
              --sku Free \
              --source "https://github.com/${{ github.repository }}" \
              --branch "main" \
              --app-location "AAUG Website App" \
              --output-location "." \
              --token "${{ secrets.GITHUB_TOKEN }}" || true

            echo "⏳ Waiting for Static Web App to be created..."
            sleep 15
          fi

          # Try to retrieve deployment token
          max_attempts=5
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            echo "🔄 Attempt $attempt/$max_attempts to retrieve token..."

            # Method 1: Query from list
            token=$(az staticwebapp list -g "$RG" \
              --query "[?name=='$APP_NAME'].repositoryToken" -o tsv 2>/dev/null | head -1)

            # Method 2: If list fails, try show command
            if [ -z "$token" ]; then
              token=$(az staticwebapp show -g "$RG" -n "$APP_NAME" \
                --query "repositoryToken" -o tsv 2>/dev/null || echo "")
            fi

            # Method 3: If still no token, try secrets endpoint
            if [ -z "$token" ]; then
              token=$(az rest --method post \
                --url "/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/$RG/providers/Microsoft.Web/staticSites/$APP_NAME/listSecrets?api-version=2023-01-01" \
                --query "properties.repositoryToken" -o tsv 2>/dev/null || echo "")
            fi

            if [ -n "$token" ] && [ "$token" != "None" ] && [ "$token" != "" ]; then
              echo "✅ Deployment token retrieved successfully!"
              echo "::add-mask::$token"
              echo "deployment_token=$token" >> $GITHUB_OUTPUT
              exit 0
            fi

            echo "⏳ Token not available yet, retrying in 10 seconds... (attempt $attempt/$max_attempts)"
            sleep 10
            ((attempt++))
          done

          echo ""
          echo "❌ Failed to retrieve deployment token after $max_attempts attempts"
          echo ""
          echo "🔍 Debugging Information:"
          echo "  Resource Group: $RG"
          echo "  App Name: $APP_NAME"
          echo "  Subscription ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          echo ""
          echo "📋 Static Web Apps in resource group:"
          az staticwebapp list -g "$RG" -o table 2>/dev/null || echo "  (none found)"
          echo ""
          echo "🔧 Troubleshooting steps:"
          echo "  1. Verify resource group exists:"
          echo "     az group show -n $RG"
          echo "  2. Verify Static Web App exists:"
          echo "     az staticwebapp show -g $RG -n $APP_NAME"
          echo "  3. Check permissions:"
          echo "     az role assignment list --scope /subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/$RG"
          echo ""
          exit 1

      - name: Get Static Web App URL
        id: swa-url
        run: |
          APP_NAME="${{ needs.check-infrastructure.outputs.app_name }}"
          url=$(az staticwebapp show -g ${{ env.RESOURCE_GROUP }} \
            -n "$APP_NAME" \
            --query defaultHostname -o tsv 2>/dev/null || echo "")

          if [ -n "$url" ]; then
            echo "app_url=https://${url}" >> $GITHUB_OUTPUT
            echo "✅ App URL: https://${url}"
          else
            echo "app_url=https://${APP_NAME}.azurestaticapps.net" >> $GITHUB_OUTPUT
          fi

      - name: Verify deployment token
        run: |
          TOKEN="${{ steps.swa-token.outputs.deployment_token }}"
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "None" ]; then
            echo "❌ Deployment token is empty or invalid"
            echo "⚠️  Cannot proceed with deployment"
            exit 1
          fi
          echo "✅ Deployment token is valid and ready"

      - name: Deploy website files
        uses: azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.deployment_token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: ${{ env.APP_LOCATION }}
          output_location: ${{ env.OUTPUT_LOCATION }}
          skip_app_build: true

      - name: Verify deployment
        run: |
          echo "⏳ Waiting for deployment to complete..."
          sleep 5

          echo "🔍 Verifying website..."
          APP_URL="${{ steps.swa-url.outputs.app_url }}"

          if curl -s -o /dev/null -w "%{http_code}" "$APP_URL/index.html" | grep -q "200"; then
            echo "✅ Home page is accessible"
          else
            echo "⚠️  Home page still deploying (this is normal)"
          fi

          if curl -s -o /dev/null -w "%{http_code}" "$APP_URL/artemis.html" | grep -q "200"; then
            echo "✅ Artemis page is accessible"
          else
            echo "⚠️  Artemis page still deploying (this is normal)"
          fi

      - name: Create deployment summary
        if: always()
        env:
          APP_NAME: ${{ needs.check-infrastructure.outputs.app_name }}
          ENV_NAME: ${{ needs.check-infrastructure.outputs.env_name }}
          APP_URL: ${{ steps.swa-url.outputs.app_url }}
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## 🚀 Deployment Complete

          | Property | Value |
          |----------|-------|
          | **Status** | ✅ Deployed |
          | **Environment** | ${{ env.ENV_NAME }} |
          | **App Name** | ${{ env.APP_NAME }} |
          | **Website URL** | [${{ env.APP_URL }}](${{ env.APP_URL }}) |
          | **Branch** | ${{ github.ref_name }} |
          | **Commit** | [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) |

          ### 📄 Pages

          - 🏠 **[Home](${{ env.APP_URL }}/index.html)** - AAUG April 2026 Meetup
          - 🚀 **[Artemis II Mission](${{ env.APP_URL }}/artemis.html)** - Space Mission Details

          ### ✨ Deployment Details

          - **Triggered by**: ${{ github.event_name }}
          - **Resource Group**: ${{ env.RESOURCE_GROUP }}
          - **Deployment Time**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')

          ---

          **Next Time You Update:**
          Simply push changes to `AAUG Website App/` and this pipeline will automatically redeploy your site in ~2 minutes!

          EOF

      - name: Print deployment success
        if: success()
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║                  ✅ DEPLOYMENT SUCCESSFUL                  ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          echo "🌐 Your website is now live at:"
          echo ""
          echo "   ${{ steps.swa-url.outputs.app_url }}"
          echo ""
          echo "────────────────────────────────────────────────────────────"
          echo "📄 Pages:"
          echo "   🏠 Home:       ${{ steps.swa-url.outputs.app_url }}/index.html"
          echo "   🚀 Artemis II: ${{ steps.swa-url.outputs.app_url }}/artemis.html"
          echo "────────────────────────────────────────────────────────────"
          echo ""
          echo "💡 Automatic Redeployment:"
          echo "   Every time you push changes to AAUG Website App/"
          echo "   this pipeline will automatically:"
          echo "   ✓ Validate your HTML files"
          echo "   ✓ Verify Azure infrastructure"
          echo "   ✓ Deploy your changes"
          echo "   ✓ Verify the deployment"
          echo ""
          echo "   ~2 minutes from push to live!"
          echo ""
