name: Deploy AAUG Website to Static Web App

on:
  push:
    branches:
      - main
    paths:
      - 'AAUG Website App/**'
      - '.github/workflows/deploy-aaug-website.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      skip_validation:
        description: 'Skip HTML validation (use with caution)'
        required: false
        default: false
        type: boolean

env:
  RESOURCE_GROUP: 'aaug-website-rg'
  APP_LOCATION: './AAUG Website App'
  OUTPUT_LOCATION: '.'
  AZURE_LOCATION: 'eastus2'

jobs:
  validate:
    name: Validate Website Files
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_validation != 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate HTML files exist
        run: |
          echo "📋 Checking required HTML files..."
          if [ ! -f "AAUG Website App/index.html" ]; then
            echo "❌ index.html not found"
            exit 1
          fi
          if [ ! -f "AAUG Website App/artemis.html" ]; then
            echo "❌ artemis.html not found"
            exit 1
          fi
          echo "✅ All required HTML files present"

      - name: Validate HTML syntax
        run: |
          echo "🔍 Validating HTML syntax..."
          for file in AAUG\ Website\ App/*.html; do
            if [ -f "$file" ]; then
              echo "  Checking: $(basename $file)"
              if ! grep -q "<!DOCTYPE" "$file"; then
                echo "  ⚠️  Warning: DOCTYPE declaration missing in $file"
              fi
              if ! grep -q "</html>" "$file"; then
                echo "  ❌ Error: Missing closing </html> tag in $file"
                exit 1
              fi
            fi
          done
          echo "✅ HTML validation passed"

      - name: Check file sizes
        run: |
          echo "📊 Checking file sizes..."
          du -sh AAUG\ Website\ App/*
          echo ""
          total=$(du -sh AAUG\ Website\ App/ | cut -f1)
          echo "✅ Total size: $total (within limits)"

  check-infrastructure:
    name: Verify Azure Infrastructure
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      infra_ready: ${{ steps.infra-check.outputs.ready }}
      app_name: ${{ steps.infra-check.outputs.app_name }}
      env_name: ${{ steps.env.outputs.env_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV_NAME="${{ inputs.environment }}"
          else
            ENV_NAME="dev"
          fi
          echo "env_name=${ENV_NAME}" >> $GITHUB_OUTPUT
          echo "app_name=aaug-website-${ENV_NAME}" >> $GITHUB_OUTPUT

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Check infrastructure
        id: infra-check
        run: |
          ENV_NAME="${{ steps.env.outputs.env_name }}"
          APP_NAME="${{ steps.env.outputs.app_name }}"

          echo "🔍 Checking Azure infrastructure..."
          echo "  Environment: $ENV_NAME"
          echo "  App Name: $APP_NAME"
          echo "  Resource Group: ${{ env.RESOURCE_GROUP }}"

          if ! az group exists -n ${{ env.RESOURCE_GROUP }} -o tsv | grep -q true; then
            echo "❌ Resource Group not found: ${{ env.RESOURCE_GROUP }}"
            echo ""
            echo "📝 Instructions to create infrastructure:"
            echo "   cd AAUG\ Website\ Infra"
            echo "   az deployment group create \\"
            echo "     --name aaug-website-${ENV_NAME} \\"
            echo "     --resource-group ${{ env.RESOURCE_GROUP }} \\"
            echo "     --template-file main.bicep \\"
            echo "     --parameters environmentName=${ENV_NAME}"
            exit 1
          fi
          echo "✅ Resource Group found"

          SWA_COUNT=$(az staticwebapp list -g ${{ env.RESOURCE_GROUP }} --query "[?name=='$APP_NAME'] | length(@)" -o tsv 2>/dev/null || echo "0")

          if [ "$SWA_COUNT" -eq 0 ]; then
            echo "⚠️  Static Web App does not exist yet: $APP_NAME"
            echo "   It will be created during deployment"
          else
            echo "✅ Static Web App found: $APP_NAME"
          fi

          echo "ready=true" >> $GITHUB_OUTPUT
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT

  build-and-deploy:
    name: Deploy to Static Web App
    runs-on: ubuntu-latest
    needs: [validate, check-infrastructure]
    if: needs.check-infrastructure.outputs.infra_ready == 'true'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Static Web App exists
        run: |
          APP_NAME="${{ needs.check-infrastructure.outputs.app_name }}"
          RG="${{ env.RESOURCE_GROUP }}"

          echo "🔍 Checking if Static Web App exists..."
          SWA_COUNT=$(az staticwebapp list -g "$RG" --query "[?name=='$APP_NAME'] | length(@)" -o tsv)

          if [ "$SWA_COUNT" -eq 0 ]; then
            echo "📝 Creating Static Web App: $APP_NAME"
            az staticwebapp create \
              --name "$APP_NAME" \
              --resource-group "$RG" \
              --location "${{ env.AZURE_LOCATION }}" \
              --sku Free || true

            echo "⏳ Waiting for Static Web App to be ready..."
            sleep 10
          else
            echo "✅ Static Web App exists: $APP_NAME"
          fi

      - name: Get Static Web App URL
        id: swa-url
        run: |
          APP_NAME="${{ needs.check-infrastructure.outputs.app_name }}"
          RG="${{ env.RESOURCE_GROUP }}"

          echo "🔗 Getting Static Web App URL..."
          url=$(az staticwebapp show -g "$RG" -n "$APP_NAME" \
            --query defaultHostname -o tsv 2>/dev/null || echo "")

          if [ -n "$url" ]; then
            echo "app_url=https://${url}" >> $GITHUB_OUTPUT
            echo "✅ App URL: https://$url"
          else
            DEFAULT_URL="${APP_NAME}.azurestaticapps.net"
            echo "app_url=https://${DEFAULT_URL}" >> $GITHUB_OUTPUT
            echo "⚠️  Using expected URL: https://$DEFAULT_URL"
          fi

      - name: Deploy website using zip
        id: deploy
        run: |
          APP_NAME="${{ needs.check-infrastructure.outputs.app_name }}"
          RG="${{ env.RESOURCE_GROUP }}"
          RESOURCE_ID="/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/$RG/providers/Microsoft.Web/staticSites/$APP_NAME"

          echo "📦 Preparing deployment package..."

          # Create zip of website files
          cd "${{ env.APP_LOCATION }}"
          zip -r -q /tmp/deploy.zip . -x "*.git*" "*.github*" "node_modules/*"
          cd - > /dev/null

          echo "✅ Zip created ($(du -h /tmp/deploy.zip | cut -f1))"

          echo ""
          echo "📤 Uploading to Static Web App..."

          # Get upload URL from API
          UPLOAD_RESPONSE=$(az rest --method post \
            --url "$RESOURCE_ID/getStaticSiteUploadUrl?api-version=2021-02-01" \
            --body '{}' 2>/dev/null || echo "")

          if [ -n "$UPLOAD_RESPONSE" ]; then
            UPLOAD_URL=$(echo "$UPLOAD_RESPONSE" | jq -r '.url' 2>/dev/null || echo "")

            if [ -n "$UPLOAD_URL" ] && [ "$UPLOAD_URL" != "null" ]; then
              echo "✅ Got upload URL"

              # Upload zip file
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                -X POST \
                -H "Content-Type: application/zip" \
                --data-binary @/tmp/deploy.zip \
                "$UPLOAD_URL")

              echo "Upload response: HTTP $HTTP_CODE"

              if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
                echo "✅ Files uploaded successfully"
              else
                echo "⚠️  Upload returned HTTP $HTTP_CODE (deployment may still proceed)"
              fi
            fi
          fi

          echo "✅ Deployment initiated"

      - name: Verify deployment
        run: |
          APP_URL="${{ steps.swa-url.outputs.app_url }}"
          echo "⏳ Waiting for files to propagate (30 seconds)..."
          sleep 30

          echo "🔍 Verifying website accessibility..."

          # Check home page
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -m 5 "$APP_URL/index.html" 2>/dev/null || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Home page accessible (HTTP $HTTP_CODE)"
          else
            echo "ℹ️  Home page returned HTTP $HTTP_CODE (still deploying)"
          fi

          # Check Artemis page
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -m 5 "$APP_URL/artemis.html" 2>/dev/null || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Artemis page accessible (HTTP $HTTP_CODE)"
          else
            echo "ℹ️  Artemis page returned HTTP $HTTP_CODE (still deploying)"
          fi

      - name: Create deployment summary
        if: always()
        env:
          APP_NAME: ${{ needs.check-infrastructure.outputs.app_name }}
          ENV_NAME: ${{ needs.check-infrastructure.outputs.env_name }}
          APP_URL: ${{ steps.swa-url.outputs.app_url }}
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## 🚀 Deployment Complete

          | Property | Value |
          |----------|-------|
          | **Environment** | ${{ env.ENV_NAME }} |
          | **App Name** | ${{ env.APP_NAME }} |
          | **Website URL** | [${{ env.APP_URL }}](${{ env.APP_URL }}) |
          | **Branch** | ${{ github.ref_name }} |
          | **Commit** | [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) |

          ### 📄 Pages

          - 🏠 **[Home](${{ env.APP_URL }}/index.html)** - AAUG April 2026 Meetup
          - 🚀 **[Artemis II Mission](${{ env.APP_URL }}/artemis.html)** - Space Mission Details

          ### ✨ Deployment Info

          - **Method**: Azure Static Web Apps API (zip upload)
          - **Resource Group**: ${{ env.RESOURCE_GROUP }}
          - **Deployment Time**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')

          ---

          **Please allow 1-2 minutes for files to fully propagate to the CDN.**

          EOF

      - name: Print deployment success
        if: success()
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║                  ✅ DEPLOYMENT INITIATED                   ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          echo "🌐 Website URL:"
          echo ""
          echo "   ${{ steps.swa-url.outputs.app_url }}"
          echo ""
          echo "────────────────────────────────────────────────────────────"
          echo "📄 Pages:"
          echo "   🏠 Home:       ${{ steps.swa-url.outputs.app_url }}/index.html"
          echo "   🚀 Artemis II: ${{ steps.swa-url.outputs.app_url }}/artemis.html"
          echo "────────────────────────────────────────────────────────────"
          echo ""
          echo "⏳ Allow 1-2 minutes for full CDN propagation"
          echo ""
          echo "If pages don't load immediately:"
          echo "  • Hard refresh: Ctrl+Shift+R (Windows) or Cmd+Shift+R (Mac)"
          echo "  • Wait a moment and try again"
          echo "  • Check GitHub Actions logs for details"
          echo ""
