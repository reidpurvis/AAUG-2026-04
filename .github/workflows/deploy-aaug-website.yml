name: Deploy AAUG Website to Static Web App

on:
  push:
    branches:
      - main
    paths:
      - 'AAUG Website App/**'
      - '.github/workflows/deploy-aaug-website.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read

concurrency:
  group: aaug-website-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

env:
  RESOURCE_GROUP: 'rg-aaug-website'
  # SWA Free tier is not available in australiaeast — eastasia is nearest supported region
  AZURE_LOCATION: 'eastasia'

jobs:
  # ── Job 1: Validate HTML ────────────────────────────────────
  validate:
    name: Validate website files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          echo "Checking required files..."
          for f in index.html artemis.html; do
            [ -f "AAUG Website App/$f" ] \
              && echo "  OK $f" \
              || { echo "  MISSING $f"; exit 1; }
          done

      - name: Validate HTML structure
        run: |
          for f in "AAUG Website App/"*.html; do
            echo "Checking $(basename "$f")..."
            grep -q '<!DOCTYPE' "$f" || echo "  WARNING: DOCTYPE missing"
            grep -q '</html>'   "$f" || { echo "  ERROR: Missing </html>"; exit 1; }
            echo "  OK"
          done

  # ── Job 2: Provision + Deploy ────────────────────────────────
  deploy:
    name: Provision infra and deploy (${{ github.event.inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    needs: validate
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set environment variables
        id: vars
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          APP_NAME="aaug-website-${ENV}"
          echo "env=${ENV}"           >> $GITHUB_OUTPUT
          echo "app_name=${APP_NAME}" >> $GITHUB_OUTPUT
          echo "Environment : ${ENV}"
          echo "App name    : ${APP_NAME}"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create Resource Group if needed
        run: |
          RG="${{ env.RESOURCE_GROUP }}"
          if az group show -n "$RG" &>/dev/null; then
            echo "Resource group already exists: $RG"
          else
            echo "Creating resource group: $RG"
            az group create \
              --name     "$RG" \
              --location "${{ env.AZURE_LOCATION }}" \
              --tags     Project=AAUG ManagedBy="GitHub Actions"
            echo "Resource group created"
          fi

      - name: Create Static Web App if needed
        id: swa
        run: |
          APP_NAME="${{ steps.vars.outputs.app_name }}"
          RG="${{ env.RESOURCE_GROUP }}"

          if az staticwebapp show -g "$RG" -n "$APP_NAME" &>/dev/null; then
            echo "Static Web App already exists: $APP_NAME"
          else
            echo "Creating Static Web App: $APP_NAME"
            az staticwebapp create \
              --name           "$APP_NAME" \
              --resource-group "$RG" \
              --location       "${{ env.AZURE_LOCATION }}" \
              --sku            Free
            echo "Static Web App created - waiting 20s for provisioning..."
            sleep 20
          fi

          HOSTNAME=$(az staticwebapp show -g "$RG" -n "$APP_NAME" \
            --query defaultHostname -o tsv 2>/dev/null || echo "")
          echo "hostname=${HOSTNAME}" >> $GITHUB_OUTPUT
          echo "URL: https://${HOSTNAME}"

      - name: Retrieve deployment API key
        id: token
        run: |
          APP_NAME="${{ steps.vars.outputs.app_name }}"
          RG="${{ env.RESOURCE_GROUP }}"

          echo "Retrieving deployment API key..."
          # FIXED: use az staticwebapp secrets list --query properties.apiKey
          # The broken workflow used .repositoryToken which is the GitHub PAT
          # for source-control integration -- not the deployment API key.

          for attempt in 1 2 3; do
            echo "  Attempt ${attempt}/3..."
            API_KEY=$(az staticwebapp secrets list \
              -g "$RG" -n "$APP_NAME" \
              --query "properties.apiKey" -o tsv 2>/dev/null || true)

            if [ -n "$API_KEY" ] && [ "$API_KEY" != "None" ] && [ "$API_KEY" != "null" ]; then
              echo "  API key retrieved"
              echo "::add-mask::${API_KEY}"
              echo "api_key=${API_KEY}" >> $GITHUB_OUTPUT
              exit 0
            fi

            [ $attempt -lt 3 ] && { echo "  Waiting 15s..."; sleep 15; }
          done

          echo "Could not retrieve API key after 3 attempts"
          exit 1

      - name: Deploy website content
        uses: azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.token.outputs.api_key }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: './AAUG Website App'
          output_location: '.'
          skip_app_build: true

      - name: Verify deployment
        run: |
          HOSTNAME="${{ steps.swa.outputs.hostname }}"
          [ -z "$HOSTNAME" ] && { echo "No hostname available, skipping verify"; exit 0; }

          echo "Waiting 30s for CDN propagation..."
          sleep 30

          for page in index.html artemis.html; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" -m 10 \
              "https://${HOSTNAME}/${page}" 2>/dev/null || echo "000")
            [ "$CODE" = "200" ] \
              && echo "  OK ${page} (HTTP ${CODE})" \
              || echo "  PENDING ${page} (HTTP ${CODE} - CDN still propagating)"
          done

      - name: Deployment summary
        if: always()
        run: |
          HOSTNAME="${{ steps.swa.outputs.hostname }}"
          ENV="${{ steps.vars.outputs.env }}"
          APP="${{ steps.vars.outputs.app_name }}"
          echo "## Deployment Complete"                      >> $GITHUB_STEP_SUMMARY
          echo "| | |"                                       >> $GITHUB_STEP_SUMMARY
          echo "|---|---|"                                    >> $GITHUB_STEP_SUMMARY
          echo "| Environment | \`${ENV}\` |"               >> $GITHUB_STEP_SUMMARY
          echo "| App name    | \`${APP}\` |"               >> $GITHUB_STEP_SUMMARY
          if [ -n "$HOSTNAME" ]; then
            echo "| URL | [https://${HOSTNAME}](https://${HOSTNAME}) |" >> $GITHUB_STEP_SUMMARY
            echo "- [Home](https://${HOSTNAME}/index.html)"    >> $GITHUB_STEP_SUMMARY
            echo "- [Artemis II](https://${HOSTNAME}/artemis.html)" >> $GITHUB_STEP_SUMMARY
          fi
